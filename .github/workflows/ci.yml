name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  contract:
    name: Smart Contract (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Rust with wasm target
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      # Cache cargo dependencies; skip if missing
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          fail-on-cache-miss: false

      # Format & lint
      - name: Format check
        run: cd contracts/escrow_contract && cargo fmt -- --check
      - name: Clippy
        run: cd contracts/escrow_contract && cargo clippy -- -D warnings

      # Run tests
      - name: Test
        run: cd contracts/escrow_contract && cargo test

      # Build WASM
      - name: Build WASM
        run: cd contracts/escrow_contract && cargo build --release --target wasm32-unknown-unknown

  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Cache npm dependencies at root for entire monorepo
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: false

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: cd backend && npm run lint

      - name: Test
        run: cd backend && npm test

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Cache npm dependencies at root for entire monorepo
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: false

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build
